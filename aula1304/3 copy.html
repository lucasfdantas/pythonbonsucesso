<script>
//Entrada 
let n1 = parseInt(prompt("Digite o valor do 1° número:"));
// Foi colocado parserInt para converter o tipo de input solicitado pelo usuário
// O comando "prompt()" abre uma caixa de evento para digitação do usuário

let n2 = parseInt(prompt("Digite o valor do 2° número:"));

//Processamento
let soma = n1 + n2;
let sub  = n1 - n2;
let mult = n1 * n2;
let potencia = n1 ** n2;

//Saída
document.write("A soma foi: "+ soma+"<br/>" );
document.write("A subtração foi: "+ sub+"<br/>");
document.write("A multiplicação foi: "+ mult+"<br/>");
document.write("A potência foi de  "+ n1 +" elevado a: "+n2+" = "+potencia+"<br/>");


</script>
